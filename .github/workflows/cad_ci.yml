name: CAD CI

on:
    push:
        branches:
            - main
        paths:
            - "case/**"
            - "scripts/**"
            - ".github/workflows/cad_ci.yml"
    pull_request:
        paths:
            - "case/**"
            - "scripts/**"
            - ".github/workflows/cad_ci.yml"
    workflow_dispatch:

jobs:
    openscad:
        name: Build STL files
        runs-on: ubuntu-latest
        steps:
            - name: Setup
              uses: actions/checkout@v6
            - name: Install OpenSCAD (CLI)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y openscad xvfb
            - name: Run collision checks
              run: bash scripts/check-collisions.sh
            - name: Build enclosure_main.stl
              uses: flat35hd99/openscad-actions@v1.4
              with:
                  scad_file: case/enclosure_main.scad
                  output_file: case/enclosure_main.stl
            - name: Build enclosure_lid.stl
              uses: flat35hd99/openscad-actions@v1.4
              with:
                  scad_file: case/enclosure_lid.scad
                  output_file: case/enclosure_lid.stl
            - name: Upload STL files as artifact
              uses: actions/upload-artifact@v6
              with:
                  name: stl-files
                  path: |
                      case/enclosure_main.stl
                      case/enclosure_lid.stl
                  compression-level: 0
