name: CAD CI

on:
    push:
        branches:
            - main
        paths:
            - "case/**"
            - ".github/workflows/cad_ci.yml"
    pull_request:
        paths:
            - "case/**"
            - ".github/workflows/cad_ci.yml"
    workflow_dispatch:

jobs:
    openscad:
        name: Build STL files
        runs-on: ubuntu-latest
        steps:
            - name: Setup
              uses: actions/checkout@v6
            - name: Build enclosure_main.stl
              uses: flat35hd99/openscad-actions@v1.4
              with:
                  scad_file: case/enclosure_main.scad
                  output_file: case/enclosure_main.stl
            - name: Build enclosure_lid.stl
              uses: flat35hd99/openscad-actions@v1.4
              with:
                  scad_file: case/enclosure_lid.scad
                  output_file: case/enclosure_lid.stl
            - name: Upload STL files as artifact
              uses: actions/upload-artifact@v6
              with:
                  name: stl-files
                  path: |
                      case/enclosure_main.stl
                      case/enclosure_lid.stl
                  compression-level: 0
