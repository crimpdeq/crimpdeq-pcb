name: Release Crimpdeq PCB and 3D Case

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  pcb:
    name: Build PCB release files
    runs-on: ubuntu-latest
    env:
      PCB_FILE: pcb/crimpdeq/crimpdeq.kicad_pcb
      SCH_FILE: pcb/crimpdeq/crimpdeq.kicad_sch

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare output folders
        run: mkdir -p artifacts/gerber reports

      - name: Run schematic ERC
        uses: actions-for-kicad/kicad-actions@v1-k9.0
        with:
          schematic_file_name: ${{ env.SCH_FILE }}
          run_erc: true
          erc_output_file_name: reports/erc.rpt

      - name: Run PCB DRC
        uses: actions-for-kicad/kicad-actions@v1-k9.0
        with:
          pcb_file_name: ${{ env.PCB_FILE }}
          run_drc: true
          drc_output_file_name: reports/drc.rpt

      - name: Export PCB production files
        uses: actions-for-kicad/kicad-actions@v1-k9.0
        with:
          schematic_file_name: ${{ env.SCH_FILE }}
          schematic_output_pdf: true
          schematic_output_pdf_file_name: artifacts/schematic.pdf
          schematic_output_bom: true
          schematic_output_bom_file_name: artifacts/bom.csv

          pcb_file_name: ${{ env.PCB_FILE }}
          pcb_output_pdf: true
          pcb_output_pdf_file_name: artifacts/layout.pdf
          pcb_output_layers: F.Cu,B.Cu,F.Silkscreen,B.Silkscreen,Edge.Cuts
          pcb_output_gerbers_and_drill: true
          pcb_output_gerbers_and_drill_folder_name: artifacts/gerber
          pcb_output_pos: true
          pcb_output_pos_file_name: artifacts/position.csv
          pcb_output_pos_format: csv
          pcb_output_pos_side: both

      - name: Create gerber archive
        run: cd artifacts/gerber && zip -r ../gerber.zip .

      - name: Upload PCB release files
        uses: actions/upload-artifact@v6
        with:
          name: release-pcb-files
          path: |
            artifacts/gerber.zip
            artifacts/bom.csv
            artifacts/position.csv
            artifacts/schematic.pdf
            artifacts/layout.pdf
          if-no-files-found: error

  case:
    name: Build 3D case release files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare output folder
        run: mkdir -p artifacts

      - name: Build enclosure_main.stl
        uses: flat35hd99/openscad-actions@v1.4
        with:
          scad_file: case/enclosure_main.scad
          output_file: artifacts/enclosure_main.stl

      - name: Build enclosure_lid.stl
        uses: flat35hd99/openscad-actions@v1.4
        with:
          scad_file: case/enclosure_lid.scad
          output_file: artifacts/enclosure_lid.stl

      - name: Upload case release files
        uses: actions/upload-artifact@v6
        with:
          name: release-case-files
          path: |
            artifacts/enclosure_main.stl
            artifacts/enclosure_lid.stl
          if-no-files-found: error
          compression-level: 0

  publish:
    name: Upload files to GitHub release
    runs-on: ubuntu-latest
    needs:
      - pcb
      - case

    steps:
      - name: Download PCB release files
        uses: actions/download-artifact@v6
        with:
          name: release-pcb-files
          path: release-assets/pcb

      - name: Download case release files
        uses: actions/download-artifact@v6
        with:
          name: release-case-files
          path: release-assets/case

      - name: Verify release assets exist
        run: |
          test -f release-assets/pcb/gerber.zip
          test -f release-assets/pcb/bom.csv
          test -f release-assets/pcb/position.csv
          test -f release-assets/pcb/schematic.pdf
          test -f release-assets/pcb/layout.pdf
          test -f release-assets/case/enclosure_main.stl
          test -f release-assets/case/enclosure_lid.stl

      - name: Upload release assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: release-assets/*/*
          file_glob: true
          overwrite: true
