name: Release Crimpdeq PCB

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  pcb:
    name: Build PCB release files
    runs-on: ubuntu-latest
    env:
      PCB_FILE: pcb/crimpdeq/crimpdeq.kicad_pcb
      SCH_FILE: pcb/crimpdeq/crimpdeq.kicad_sch

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare output folders
        run: mkdir -p artifacts/gerber reports

      - name: Run schematic ERC
        id: erc
        uses: actions-for-kicad/kicad-actions@v2-k10.0
        continue-on-error: true
        with:
          schematic_file_name: ${{ env.SCH_FILE }}
          run_erc: true
          erc_output_file_name: reports/erc.rpt

      - name: Evaluate ERC report
        run: bash .github/scripts/check-kicad-report.sh reports/erc.rpt "Schematic ERC"

      - name: Run PCB DRC
        id: drc
        uses: actions-for-kicad/kicad-actions@v2-k10.0
        continue-on-error: true
        with:
          pcb_file_name: ${{ env.PCB_FILE }}
          run_drc: true
          drc_output_file_name: reports/drc.rpt

      - name: Evaluate DRC report
        run: bash .github/scripts/check-kicad-report.sh reports/drc.rpt "PCB DRC"

      - name: Export schematic production files
        uses: actions-for-kicad/kicad-actions@v2-k10.0
        with:
          schematic_file_name: ${{ env.SCH_FILE }}
          schematic_output_pdf: true
          schematic_output_pdf_file_name: artifacts/schematic.pdf
          schematic_output_bom: true
          schematic_output_bom_file_name: artifacts/bom.raw.csv
          schematic_output_bom_fields: 'Reference,Footprint,${QUANTITY},Value,LCSC,${DNP},AssemblyNote'
          schematic_output_bom_labels: 'Reference,Footprint,Quantity,Value,LCSC Part #,DNP,Assembly Note'

      - name: Export PCB layout PDF
        uses: actions-for-kicad/kicad-actions@v2-k10.0
        with:
          pcb_file_name: ${{ env.PCB_FILE }}
          pcb_output_pdf: true
          pcb_output_pdf_file_name: artifacts/layout.pdf
          pcb_output_layers: F.Cu,B.Cu,F.Silkscreen,B.Silkscreen,Edge.Cuts

      - name: Export PCB fabrication files
        uses: actions-for-kicad/kicad-actions@v2-k10.0
        with:
          pcb_file_name: ${{ env.PCB_FILE }}
          pcb_output_layers: F.Cu,B.Cu,F.Mask,B.Mask,F.Paste,B.Paste,F.Silkscreen,B.Silkscreen,Edge.Cuts
          pcb_output_gerbers_and_drill: true
          pcb_output_gerbers_and_drill_folder_name: artifacts/gerber
          pcb_output_pos: true
          pcb_output_pos_file_name: artifacts/position.csv
          pcb_output_pos_format: csv
          pcb_output_pos_side: both

      - name: Format grouped BOM
        run: |
          bash .github/scripts/generate-bom.sh artifacts/bom.raw.csv "$SCH_FILE" artifacts/bom.csv
          rm artifacts/bom.raw.csv

      - name: Verify Gerber fabrication layers
        run: |
          required=(
            "F_Cu:*.gtl *-F_Cu.gbr"
            "B_Cu:*.gbl *-B_Cu.gbr"
            "F_Mask:*.gts *-F_Mask.gbr"
            "B_Mask:*.gbs *-B_Mask.gbr"
            "F_Paste:*.gtp *-F_Paste.gbr"
            "B_Paste:*.gbp *-B_Paste.gbr"
            "F_Silkscreen:*.gto *-F_Silkscreen.gbr"
            "B_Silkscreen:*.gbo *-B_Silkscreen.gbr"
            "Edge_Cuts:*.gm1 *.gko *-Edge_Cuts.gbr"
            "Drill:*.drl"
          )

          for item in "${required[@]}"; do
            name="${item%%:*}"
            patterns="${item#*:}"
            found=0
            for pattern in $patterns; do
              if compgen -G "artifacts/gerber/$pattern" > /dev/null; then
                found=1
                break
              fi
            done
            if [ "$found" -ne 1 ]; then
              echo "::error::Missing Gerber fabrication output for $name"
              ls -la artifacts/gerber
              exit 1
            fi
          done

      - name: Create gerber archive
        run: cd artifacts/gerber && zip -r ../gerber.zip .

      - name: Create fab-friendly gerber archive
        run: |
          mkdir -p artifacts/fab-gerber
          shopt -s nullglob

          copied=0
          for src in artifacts/gerber/*; do
            base="$(basename "$src")"

            case "$base" in
              *.gtl|*.gbl|*.gts|*.gbs|*.gtp|*.gbp|*.gto|*.gbo|*.gm1|*.gko|*.drl)
                dst="$base"
                ;;
              *-F_Cu.gbr) dst="${base%.gbr}.gtl" ;;
              *-B_Cu.gbr) dst="${base%.gbr}.gbl" ;;
              *-F_Mask.gbr) dst="${base%.gbr}.gts" ;;
              *-B_Mask.gbr) dst="${base%.gbr}.gbs" ;;
              *-F_Paste.gbr) dst="${base%.gbr}.gtp" ;;
              *-B_Paste.gbr) dst="${base%.gbr}.gbp" ;;
              *-F_Silkscreen.gbr) dst="${base%.gbr}.gto" ;;
              *-B_Silkscreen.gbr) dst="${base%.gbr}.gbo" ;;
              *-Edge_Cuts.gbr) dst="${base%.gbr}.gm1" ;;
              *) continue ;;
            esac

            cp "$src" "artifacts/fab-gerber/$dst"
            copied=1
          done

          test "$copied" -eq 1
          cd artifacts/fab-gerber && zip -r ../crimpdeq.zip .

      - name: Upload PCB release files
        uses: actions/upload-artifact@v6
        with:
          name: release-pcb-files
          path: |
            artifacts/gerber.zip
            artifacts/crimpdeq.zip
            artifacts/bom.csv
            artifacts/position.csv
            artifacts/schematic.pdf
            artifacts/layout.pdf
          if-no-files-found: error

  publish:
    name: Upload files to GitHub release
    runs-on: ubuntu-latest
    needs:
      - pcb

    steps:
      - name: Download PCB release files
        uses: actions/download-artifact@v6
        with:
          name: release-pcb-files
          path: release-assets/pcb

      - name: Verify release assets exist
        run: |
          test -f release-assets/pcb/gerber.zip
          test -f release-assets/pcb/crimpdeq.zip
          test -f release-assets/pcb/bom.csv
          test -f release-assets/pcb/position.csv
          test -f release-assets/pcb/schematic.pdf
          test -f release-assets/pcb/layout.pdf
      - name: Upload release assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: release-assets/*/*
          file_glob: true
          overwrite: true
